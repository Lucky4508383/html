<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Universal Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ed1c24;
            --primary-hover: #ff333a;
            --primary-glow: rgba(237, 28, 36, 0.4);
            --bg-body: #09090b;
            --bg-glass: rgba(20, 20, 25, 0.65);
            --bg-glass-hover: rgba(30, 30, 35, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            background-image:
                radial-gradient(at 0% 0%, rgba(237, 28, 36, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 58, 138, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(237, 28, 36, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(15, 23, 42, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0 40px;
            display: flex;
            align-items: center;
            height: 70px;
            gap: 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffccd0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            background-color: var(--primary);
            border-radius: 6px;
            mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 22h20L12 2z"/></svg>') center/contain no-repeat;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 3L1 21h22L12 3z"/></svg>') center/contain no-repeat;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            height: 100%;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            position: relative;
            transition: color 0.3s ease;
            letter-spacing: 0.3px;
        }

        .nav-link:hover {
            color: white;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 0%;
            height: 2px;
            background-color: var(--primary);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-link.active {
            color: white;
            font-weight: 600;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            margin-top: 35px;
        }

        .section-header:first-child {
            margin-top: 0;
        }

        .section-header h2 {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .section-header h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background-color: var(--primary);
            margin-right: 12px;
            border-radius: 2px;
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .highlight-text {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
            margin-left: 10px;
            padding-left: 15px;
            border-left: 1px solid var(--border-glass);
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        @media (min-width: 1200px) {
            .results-grid {
                grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            }
        }

        /* Horizontal Scroll for Trending */
        .scroller-container {
            display: flex;
            overflow-x: auto;
            gap: 25px;
            padding-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) rgba(255,255,255,0.1);
        }
        
        .scroller-container::-webkit-scrollbar {
            height: 8px;
        }
        
        .scroller-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        
        .scroller-container::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 4px;
        }

        .scroller-container .poster-card {
            min-width: 180px;
            width: 180px;
            flex-shrink: 0;
        }

        @media (min-width: 1200px) {
            .scroller-container .poster-card {
                min-width: 210px;
                width: 210px;
            }
        }

        .poster-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            border-radius: 12px;
            overflow: hidden;
            background-color: rgba(20, 20, 25, 0.5);
            border: 1px solid var(--border-glass);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transform-origin: center bottom;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .poster-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.4s ease;
        }

        /* Glassmorphic overlay */
        .poster-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.5) 50%, rgba(0, 0, 0, 0.3) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: stretch;
            padding: 20px 15px;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .poster-wrapper:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .poster-wrapper:hover .poster-overlay {
            opacity: 1;
        }

        .poster-wrapper:hover .poster-image {
            transform: scale(1.08);
            filter: brightness(0.6);
        }

        .overlay-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            backdrop-filter: blur(10px);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 10px auto;
            transition: all 0.2s;
            font-family: inherit;
        }

        .overlay-select option {
            background: #111;
        }

        .overlay-select:focus {
            outline: none;
            border-color: rgba(237, 28, 36, 0.8);
            background: rgba(255, 255, 255, 0.15);
        }

        .overlay-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(237, 28, 36, 0.3);
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .overlay-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .overlay-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(237, 28, 36, 0.4);
        }

        .overlay-btn:hover::after {
            opacity: 1;
        }

        .overlay-btn:active {
            transform: translateY(1px);
        }

        .poster-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 4px;
        }

        .poster-title {
            font-size: 1.05rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .poster-year {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150px;
            width: 100%;
            grid-column: 1 / -1;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--primary);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast-icon {
            color: var(--primary);
            background: rgba(237, 28, 36, 0.1);
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-glass);
            color: white;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            .navbar {
                padding: 0 20px;
                height: 60px;
            }

            .nav-links {
                display: none;
            }

            .results-grid, .scroller-container {
                gap: 15px;
            }

            .scroller-container .poster-card {
                min-width: 150px;
                width: 150px;
            }
            .results-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="home.html" class="brand">Watchlist</a>
        <div class="nav-links">
            <a href="home.html" class="nav-link active">Home</a>
            <a href="index.html" class="nav-link">Search</a>
            <a href="watchlist.html" class="nav-link">Dashboard</a>
            <a href="login.html" class="nav-link" id="authLink">Sign In</a>
        </div>
    </nav>

    <div class="container">
        <!-- Platform Rows -->
        <div class="section-header"><h2>Trending on Netflix</h2></div>
        <div class="scroller-container" id="netflixRow"><div class="loader"><div class="loader-spinner"></div></div></div>

        <div class="section-header"><h2>Trending on Prime Video</h2></div>
        <div class="scroller-container" id="primeRow"><div class="loader"><div class="loader-spinner"></div></div></div>

        <div class="section-header"><h2>Trending on Disney+</h2></div>
        <div class="scroller-container" id="disneyRow"><div class="loader"><div class="loader-spinner"></div></div></div>

        <div class="section-header"><h2>Trending Anime (Crunchyroll)</h2></div>
        <div class="scroller-container" id="crunchyrollRow"><div class="loader"><div class="loader-spinner"></div></div></div>

        <div class="section-header"><h2>Trending Asian Dramas (Rakuten Viki)</h2></div>
        <div class="scroller-container" id="vikiRow"><div class="loader"><div class="loader-spinner"></div></div></div>

        <!-- Genre Rows -->
        <div class="section-header"><h2>Action & Adventure</h2></div>
        <div class="scroller-container" id="actionRow"><div class="loader"><div class="loader-spinner"></div></div></div>

        <div class="section-header"><h2>Top Rated Comedies</h2></div>
        <div class="scroller-container" id="comedyRow"><div class="loader"><div class="loader-spinner"></div></div></div>

        <div class="section-header"><h2>Sci-Fi & Fantasy</h2></div>
        <div class="scroller-container" id="scifiRow"><div class="loader"><div class="loader-spinner"></div></div></div>
    </div>

    <!-- Toasts -->
    <div class="toast" id="successToast">
        <div class="toast-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
        </div>
        <span>Added to watchlist!</span>
    </div>

    <div class="toast" id="infoToast" style="border-left-color: #3b82f6;">
        <div class="toast-icon" style="color: #3b82f6; background: rgba(59, 130, 246, 0.1);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        </div>
        <span>Already in watchlist!</span>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, signOut, doc, setDoc, getDoc } from './firebase-config.js';

        const API_KEY = '15d2ea6d0dc1d476efbca3eba2b9bbfb';

        const successToast = document.getElementById('successToast');
        const infoToast = document.getElementById('infoToast');

        const rowsConfig = [
            { id: 'netflixRow', type: 'provider', query: 'with_watch_providers=8&with_watch_monetization_types=flatrate', platform: 'Netflix' },
            { id: 'primeRow', type: 'provider', query: 'with_watch_providers=119&with_watch_monetization_types=flatrate', platform: 'Prime Video' },
            { id: 'disneyRow', type: 'provider', query: 'with_watch_providers=337&with_watch_monetization_types=flatrate', platform: 'Disney+' },
            { id: 'crunchyrollRow', type: 'provider', query: 'with_watch_providers=283&with_watch_monetization_types=flatrate', platform: 'Crunchyroll' },
            { id: 'vikiRow', type: 'provider', query: 'with_watch_providers=344&with_watch_monetization_types=flatrate', platform: 'Rakuten Viki' },
            { id: 'actionRow', type: 'genre', query: 'with_genres=28,10759', platform: 'Netflix' },
            { id: 'comedyRow', type: 'genre', query: 'with_genres=35', platform: 'Netflix' },
            { id: 'scifiRow', type: 'genre', query: 'with_genres=878,10765', platform: 'Netflix' }
        ];

        let currentUser = null;
        let windowUserWatchlist = [];
        let fetchedData = {};

        onAuthStateChanged(auth, async (user) => {
            const authLink = document.getElementById('authLink');
            if (user) {
                currentUser = user;
                authLink.textContent = "Logout";
                authLink.href = "#";
                authLink.onclick = (e) => {
                    e.preventDefault();
                    signOut(auth).then(() => {
                        window.location.reload();
                    });
                };

                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().watchlist) {
                        windowUserWatchlist = userDoc.data().watchlist;
                    }
                } catch (e) {
                    console.error("Error fetching watchlist", e);
                }
            } else {
                currentUser = null;
                windowUserWatchlist = [];
                authLink.textContent = "Sign In";
                authLink.href = "login.html";
                authLink.onclick = null;
            }

            // Render previously cached items if available, or fetch
            if (Object.keys(fetchedData).length > 0) {
                rowsConfig.forEach(row => {
                    const container = document.getElementById(row.id);
                    if (fetchedData[row.id] && container) {
                        renderCards(fetchedData[row.id], container, row.platform);
                    }
                });
            } else {
                fetchAllRows();
            }
        });

        let initialized = false;
        setTimeout(() => {
            if(!initialized && !currentUser) {
                fetchAllRows();
                initialized = true;
            }
        }, 1000); // safety fallback

        async function fetchAllRows() {
            initialized = true;
            rowsConfig.forEach(row => {
                fetchRow(row);
            });
        }

        async function fetchRow(row) {
            const container = document.getElementById(row.id);
            if (!container) return;
            try {
                let movieUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&watch_region=US&sort_by=popularity.desc&page=1&${row.query}`;
                let tvUrl = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&watch_region=US&sort_by=popularity.desc&page=1&${row.query}`;

                const [movieRes, tvRes] = await Promise.all([
                    fetch(movieUrl),
                    fetch(tvUrl)
                ]);

                const [movieData, tvData] = await Promise.all([movieRes.json(), tvRes.json()]);
                
                let combined = [
                    ...(movieData.results || []).map(m => ({ ...m, media_type: 'movie' })),
                    ...(tvData.results || []).map(t => ({ ...t, media_type: 'tv' }))
                ];

                combined.sort((a, b) => b.popularity - a.popularity);
                combined = combined.slice(0, 15);
                
                fetchedData[row.id] = combined;
                renderCards(combined, container, row.platform);
            } catch(e) {
                console.error("Error fetching row " + row.id, e);
                container.innerHTML = '<div style="color:red; padding: 20px;">Failed to load items.</div>';
            }
        }

        function renderCards(results, container, defaultPlatform) {
            const defaultImg = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4=';
            
            const list = windowUserWatchlist;

            const cardsHTML = results.map((item, index) => {
                const isMovie = item.media_type === 'movie';
                const title = isMovie ? (item.title || item.original_title) : (item.name || item.original_name);
                const year = isMovie ? (item.release_date ? item.release_date.substring(0, 4) : 'N/A') : (item.first_air_date ? item.first_air_date.substring(0, 4) : 'N/A');
                const typeStr = isMovie ? 'Movie' : 'Show';
                const imageUrl = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : defaultImg;
                const cleanTitle = title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                // For uniqueness in IDs
                const uniqueId = `${container.id}_${item.id}`;
                const platformId = 'plat_' + uniqueId;
                const statusId = 'stat_' + uniqueId;
                
                const itemYear = year !== 'N/A' ? year : null;
                const watchlistItem = list.find(wItem => wItem.title === title && wItem.year == itemYear);
                
                let overlayContent = '';
                if (watchlistItem) {
                    overlayContent = `
                        <div style="background: rgba(20, 20, 25, 0.8); border: 1px solid rgba(255, 255, 255, 0.15); border-top: 2px solid var(--primary); border-radius: 8px; padding: 12px 10px; text-align: center; display: flex; flex-direction: column; gap: 4px; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-top: auto;" onclick="event.stopPropagation(); window.showAlreadyInListToast()">
                            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">In Watchlist</div>
                            <div style="font-size: 0.95rem; font-weight: 700; color: white;">${watchlistItem.platform}</div>
                            <div style="font-size: 0.85rem; color: var(--primary); font-weight: 500; text-transform: capitalize;">${watchlistItem.status.replace(/-/g, ' ')}</div>
                        </div>
                    `;
                } else {
                    let autoPlatform = defaultPlatform;
                    overlayContent = `
                        <select id="${platformId}" class="overlay-select" onclick="event.stopPropagation()">
                            <option value="Netflix" ${autoPlatform === 'Netflix' ? 'selected' : ''}>Netflix</option>
                            <option value="Prime Video" ${autoPlatform === 'Prime Video' ? 'selected' : ''}>Prime Video</option>
                            <option value="Disney+" ${autoPlatform === 'Disney+' ? 'selected' : ''}>Disney+</option>
                            <option value="Crunchyroll" ${autoPlatform === 'Crunchyroll' ? 'selected' : ''}>Crunchyroll</option>
                            <option value="Rakuten Viki" ${autoPlatform === 'Rakuten Viki' ? 'selected' : ''}>Rakuten Viki</option>
                            <option value="Other" ${autoPlatform === 'Other' ? 'selected' : ''}>Other</option>
                        </select>
                        <select id="${statusId}" class="overlay-select" onclick="event.stopPropagation()">
                            <option value="Watching">Watching</option>
                            <option value="plan-to-watch">Plan to watch</option>
                            <option value="on-hold">On Hold</option>
                            <option value="watched">Watched</option>
                        </select>
                        <button class="overlay-btn" onclick="event.stopPropagation(); window.addToWatchlist('${item.id}', '${item.media_type}', '${cleanTitle}', '${imageUrl}', '${year}', '${platformId}', '${statusId}', this)">Add to List</button>
                    `;
                }

                return `
                <div class="poster-card" style="animation-delay: ${index * 0.05}s">
                    <div class="poster-wrapper" style="cursor: pointer;" onclick="window.location.href='details.html?id=${item.id}&type=${item.media_type}'">
                        <img src="${imageUrl}" class="poster-image" alt="${cleanTitle}" loading="lazy" onerror="this.src='${defaultImg}'">
                        <div class="poster-overlay">
                            ${overlayContent}
                        </div>
                    </div>
                    <div class="poster-info">
                        <div class="poster-title" style="cursor: pointer;" onclick="window.location.href='details.html?id=${item.id}&type=${item.media_type}'">${title}</div>
                        <div class="poster-year">${year} • ${typeStr}</div>
                    </div>
                </div>
            `;
            }).join('');

            container.innerHTML = cardsHTML;
        }

        window.showToast = function () {
            successToast.classList.add('show');
            setTimeout(() => { successToast.classList.remove('show'); }, 3000);
        }

        window.showAlreadyInListToast = function () {
            infoToast.classList.add('show');
            setTimeout(() => { infoToast.classList.remove('show'); }, 3000);
        }

        window.addToWatchlist = async function (tmdbId, mediaType, title, image, year, platformSelectId, statusSelectId, btnElement) {
            if (!currentUser) {
                window.location.href = "login.html";
                return;
            }

            const platform = document.getElementById(platformSelectId).value;
            const status = document.getElementById(statusSelectId).value;

            const itemYear = year !== 'N/A' ? year : null;
            if (windowUserWatchlist.some(wItem => wItem.title === title && wItem.year == itemYear)) {
                window.showAlreadyInListToast();
                return;
            }

            const mediaObj = {
                id: Date.now(),
                tmdbId,
                mediaType,
                title,
                platform,
                status,
                image,
                year: itemYear
            };

            const newList = [...windowUserWatchlist, mediaObj];
            windowUserWatchlist = newList;

            window.showToast();

            const overlayDiv = btnElement.parentElement;
            overlayDiv.innerHTML = `
                <div style="background: rgba(20, 20, 25, 0.8); border: 1px solid rgba(255, 255, 255, 0.15); border-top: 2px solid var(--primary); border-radius: 8px; padding: 12px 10px; text-align: center; display: flex; flex-direction: column; gap: 4px; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-top: auto;" onclick="event.stopPropagation(); window.showAlreadyInListToast()">
                    <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Added</div>
                    <div style="font-size: 0.95rem; font-weight: 700; color: white;">${platform}</div>
                    <div style="font-size: 0.85rem; color: var(--primary); font-weight: 500; text-transform: capitalize;">${status.replace(/-/g, ' ')}</div>
                </div>
            `;

            setTimeout(() => {
                const titleNode = overlayDiv.querySelector('div > div:first-child');
                if (titleNode) titleNode.innerText = 'In Watchlist';
            }, 2000);

            try {
                await setDoc(doc(db, "users", currentUser.uid), { watchlist: newList }, { merge: true });
            } catch (e) {
                console.error("Error saving to Firestore", e);
            }
        }
    </script>
</body>
</html>
