<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Universal Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #ed1c24;
            /* Trakt Red */
            --primary-hover: #ff333a;
            --primary-glow: rgba(237, 28, 36, 0.4);
            --bg-body: #09090b;
            --bg-glass: rgba(20, 20, 25, 0.65);
            --bg-glass-hover: rgba(30, 30, 35, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            /* Animated background mesh gradient */
            background-image:
                radial-gradient(at 0% 0%, rgba(237, 28, 36, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 58, 138, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(237, 28, 36, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(15, 23, 42, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0 40px;
            display: flex;
            align-items: center;
            height: 70px;
            gap: 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffccd0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            background-color: var(--primary);
            border-radius: 6px;
            mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 22h20L12 2z"/></svg>') center/contain no-repeat;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 3L1 21h22L12 3z"/></svg>') center/contain no-repeat;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            height: 100%;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            position: relative;
            transition: color 0.3s ease;
            letter-spacing: 0.3px;
        }

        .nav-link:hover {
            color: white;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 0%;
            height: 2px;
            background-color: var(--primary);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-link.active {
            color: white;
            font-weight: 600;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 50px;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Global Header */
        .page-header {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -1px;
        }

        /* Stats Chart Container */
        .stats-container {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .stats-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 180px;
        }

        /* Dashboard Rows */
        .category-row {
            margin-bottom: 50px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .category-header h3 {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            letter-spacing: -0.5px;
        }

        .category-header h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background-color: var(--primary);
            margin-right: 12px;
            border-radius: 2px;
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .expand-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            margin-left: auto;
            font-family: inherit;
        }

        .expand-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .count-badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.8rem;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        /* Results Grid */
        .poster-grid {
            display: flex;
            overflow-x: auto;
            gap: 25px;
            padding-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
            min-height: 250px;
        }

        .poster-grid::-webkit-scrollbar {
            height: 8px;
        }

        .poster-grid::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .poster-grid.extended {
            display: flex;
            flex-wrap: wrap;
            overflow-x: visible;
        }

        .poster-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
            width: 180px;
            flex-shrink: 0;
        }

        @media (min-width: 1200px) {
            .poster-card {
                width: 210px;
            }
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            border-radius: 12px;
            overflow: hidden;
            background-color: rgba(20, 20, 25, 0.5);
            border: 1px solid var(--border-glass);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transform-origin: center bottom;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .poster-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.4s ease;
        }

        /* Glassmorphic overlay */
        .poster-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.5) 50%, rgba(0, 0, 0, 0.3) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: stretch;
            padding: 20px 15px;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .poster-wrapper:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .poster-wrapper:hover .poster-overlay {
            opacity: 1;
        }

        .poster-wrapper:hover .poster-image {
            transform: scale(1.08);
            filter: brightness(0.6);
        }

        .overlay-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            backdrop-filter: blur(10px);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 10px auto;
            transition: all 0.2s;
            font-family: inherit;
        }

        .overlay-select option {
            background: #111;
        }

        .overlay-select:focus {
            outline: none;
            border-color: rgba(237, 28, 36, 0.8);
            background: rgba(255, 255, 255, 0.15);
        }

        .platform-tag {
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 2;
        }

        .delete-btn-wide {
            background: rgba(255, 77, 79, 0.1);
            color: #ff4d4f;
            border: 1px solid rgba(255, 77, 79, 0.4);
            padding: 10px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
            width: 100%;
            margin-top: 4px;
            backdrop-filter: blur(10px);
        }

        .delete-btn-wide:hover {
            background: rgba(255, 77, 79, 0.25);
            border-color: #ff4d4f;
            transform: translateY(-1px);
        }

        .delete-btn-wide:active {
            transform: translateY(1px);
        }

        .poster-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 4px;
        }

        .poster-title {
            font-size: 1.05rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
            letter-spacing: 0.2px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .poster-year {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
            background: var(--bg-glass);
            border-radius: 16px;
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(10px);
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-height: 150px;
            justify-content: center;
        }

        .empty-state::before {
            content: '📋';
            font-size: 2.5rem;
            opacity: 0.5;
            display: block;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.9);
            }
        }

        .platform-filters {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) var(--bg-glass);
            -webkit-overflow-scrolling: touch;
        }

        .platform-filters::-webkit-scrollbar {
            height: 6px;
        }

        .platform-filters::-webkit-scrollbar-track {
            background: var(--bg-glass);
            border-radius: 10px;
        }

        .platform-filters::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 10px;
        }

        .filter-pill {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-muted);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-family: inherit;
        }

        .filter-pill:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .filter-pill.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .navbar {
                padding: 0 20px;
                height: 60px;
            }

            .nav-links {
                display: none;
            }

            .poster-card {
                width: 150px;
            }

            .poster-grid {
                gap: 15px;
            }

            .header-section {
                flex-direction: column;
                align-items: stretch;
            }

            .page-header {
                font-size: 2rem;
            }

            .stats-container {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="brand">Watchlist</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Search</a>
            <a href="watchlist.html" class="nav-link active">Dashboard</a>
            <a href="login.html" class="nav-link" id="authLink">Sign In</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h2 class="page-header">My Dashboard</h2>
            <div class="stats-container">
                <div class="stats-title">Progress Overview</div>
                <div class="chart-wrapper">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>

        <div class="platform-filters" id="platformFilters">
            <button class="filter-pill active" data-platform="All">All Platforms</button>
            <button class="filter-pill" data-platform="Netflix">Netflix</button>
            <button class="filter-pill" data-platform="Prime Video">Prime Video</button>
            <button class="filter-pill" data-platform="Disney+">Disney+</button>
            <button class="filter-pill" data-platform="Crunchyroll">Crunchyroll</button>
            <button class="filter-pill" data-platform="Rakuten Viki">Rakuten Viki</button>
            <button class="filter-pill" data-platform="Other">Other</button>
        </div>

        <div class="category-row">
            <div class="category-header">
                <h3 style="color: #ff3366;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                    Favorites
                </h3>
                <span class="count-badge" id="count-favorites"
                    style="border-color: rgba(255, 51, 102, 0.3); color: #ff3366; background: rgba(255, 51, 102, 0.1);">0</span>
            </div>
            <div class="poster-grid" id="list-favorites">
                <div class="empty-state">No favorites yet</div>
            </div>
        </div>

        <div class="category-row">
            <div class="category-header">
                <h3 style="color: #eab308;">Watching</h3>
                <span class="count-badge" id="count-Watching"
                    style="border-color: rgba(234, 179, 8, 0.3); color: #eab308; background: rgba(234, 179, 8, 0.1);">0</span>
            </div>
            <div class="poster-grid" id="list-Watching">
                <div class="empty-state">No items yet</div>
            </div>
        </div>

        <div class="category-row">
            <div class="category-header">
                <h3 style="color: #ef4444;">Plan to Watch</h3>
                <span class="count-badge" id="count-plan-to-watch"
                    style="border-color: rgba(239, 68, 68, 0.3); color: #ef4444; background: rgba(239, 68, 68, 0.1);">0</span>
            </div>
            <div class="poster-grid" id="list-plan-to-watch">
                <div class="empty-state">No items yet</div>
            </div>
        </div>

        <div class="category-row">
            <div class="category-header">
                <h3 style="color: #6b7280;">On Hold</h3>
                <span class="count-badge" id="count-on-hold"
                    style="border-color: rgba(107, 114, 128, 0.3); color: #6b7280; background: rgba(107, 114, 128, 0.1);">0</span>
            </div>
            <div class="poster-grid" id="list-on-hold">
                <div class="empty-state">No items yet</div>
            </div>
        </div>

        <div class="category-row">
            <div class="category-header">
                <h3 style="color: #22c55e;">Watched</h3>
                <span class="count-badge" id="count-watched"
                    style="border-color: rgba(34, 197, 94, 0.3); color: #22c55e; background: rgba(34, 197, 94, 0.1);">0</span>
            </div>
            <div class="poster-grid" id="list-watched">
                <div class="empty-state">No items yet</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, signOut, doc, setDoc, getDoc } from './firebase-config.js';

        let progressChart = null;
        let currentUser = null;
        let windowUserWatchlist = [];
        let windowUserFavorites = [];
        let currentPlatformFilter = 'All';

        onAuthStateChanged(auth, async (user) => {
            const authLink = document.getElementById('authLink');
            if (user) {
                currentUser = user;
                authLink.textContent = "Logout";
                authLink.href = "#";
                authLink.onclick = (e) => {
                    e.preventDefault();
                    signOut(auth).then(() => {
                        window.location.href = "login.html";
                    });
                };

                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        if (data.watchlist) windowUserWatchlist = data.watchlist;
                        if (data.favorites) windowUserFavorites = data.favorites;
                    }
                    refreshDashboard();
                } catch (e) {
                    console.error("Error fetching watchlist", e);
                }
            } else {
                window.location.href = "login.html";
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateCounts();

            const filterPills = document.querySelectorAll('.filter-pill');
            filterPills.forEach(pill => {
                pill.addEventListener('click', (e) => {
                    filterPills.forEach(p => p.classList.remove('active'));
                    const target = e.currentTarget;
                    target.classList.add('active');
                    currentPlatformFilter = target.dataset.platform;
                    refreshDashboard();
                });
            });
            const categoryHeaders = document.querySelectorAll('.category-header');
            categoryHeaders.forEach(header => {
                const expandBtn = document.createElement('button');
                expandBtn.className = 'expand-btn';
                expandBtn.innerText = 'Show All';
                header.appendChild(expandBtn);

                expandBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const currentRow = header.closest('.category-row');
                    const grid = currentRow.querySelector('.poster-grid');
                    const isExpanding = !grid.classList.contains('extended');

                    if (isExpanding) {
                        grid.classList.add('extended');
                        expandBtn.innerHTML = '<span style="font-size: 1.1em; margin-right: 4px;">&larr;</span> Back';
                        expandBtn.style.background = 'var(--primary)';
                        expandBtn.style.borderColor = 'var(--primary)';

                        // Hide everything else
                        document.querySelectorAll('.category-row').forEach(row => {
                            if (row !== currentRow) row.style.display = 'none';
                        });
                        const topHeader = document.querySelector('.header-section');
                        if (topHeader) topHeader.style.display = 'none';
                        const filters = document.getElementById('platformFilters');
                        if (filters) filters.style.display = 'none';

                        // Scroll to top
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        grid.classList.remove('extended');
                        expandBtn.innerText = 'Show All';
                        expandBtn.style.background = '';
                        expandBtn.style.borderColor = '';

                        // Restore everything
                        document.querySelectorAll('.category-row').forEach(row => {
                            row.style.display = 'block';
                        });
                        const topHeader = document.querySelector('.header-section');
                        if (topHeader) topHeader.style.display = 'flex';
                        const filters = document.getElementById('platformFilters');
                        if (filters) filters.style.display = 'flex';

                        // Scroll back to the row slightly above
                        const y = currentRow.getBoundingClientRect().top + window.scrollY - 100;
                        window.scrollTo({ top: y, behavior: 'smooth' });
                    }
                });
            });
        });

        function initChart(counts, labels) {
            const ctx = document.getElementById('progressChart').getContext('2d');

            progressChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels || ['Watching: 0', 'Plan to Watch: 0', 'On Hold: 0', 'Watched: 0'],
                    datasets: [{
                        data: counts,
                        backgroundColor: [
                            '#eab308', // Yellow for Watching
                            '#ef4444', // Red for Plan to watch
                            '#6b7280', // Grey for On Hold
                            '#22c55e'  // Green for Watched
                        ],
                        borderColor: '#09090b',
                        borderWidth: 4,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: 10
                    },
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#e2e8f0',
                                font: { family: 'Inter', size: 12 },
                                boxWidth: 12,
                                padding: 15,
                                generateLabels: function (chart) {
                                    const data = chart.data;
                                    if (data.labels.length && data.datasets.length) {
                                        const originalLabels = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                                        const sum = data.datasets[0].data.reduce((a, b) => a + b, 0);
                                        originalLabels.push({
                                            text: `Grand Total: ${sum}`,
                                            fillStyle: 'transparent',
                                            strokeStyle: 'transparent',
                                            lineWidth: 0,
                                            hidden: false,
                                            index: 99
                                        });
                                        return originalLabels;
                                    }
                                    return [];
                                }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { family: 'Inter' },
                            bodyFont: { family: 'Inter', size: 13 },
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: true,
                            callbacks: {
                                label: function (context) {
                                    const baseLabel = context.label.split(':')[0];
                                    return ` ${baseLabel}: ${context.raw}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateChart(counts) {
            const total = counts.reduce((a, b) => a + b, 0);
            const dataCounts = total === 0 ? [0, 0, 0, 0] : counts;
            const updatedLabels = [
                `Watching: ${dataCounts[0]}`,
                `Plan to Watch: ${dataCounts[1]}`,
                `On Hold: ${dataCounts[2]}`,
                `Watched: ${dataCounts[3]}`
            ];

            if (progressChart) {
                progressChart.data.datasets[0].data = dataCounts;
                progressChart.data.labels = updatedLabels;
                progressChart.update();
            } else {
                initChart(dataCounts, updatedLabels);
            }
        }

        function renderItem(item) {
            let statusListId = `list-${item.status}`;
            if (item.status === 'watching') statusListId = 'list-Watching';

            const listContainer = document.getElementById(statusListId);
            if (!listContainer) return;

            const emptyState = listContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const card = document.createElement('div');
            card.className = 'poster-card';
            card.setAttribute('data-id', item.id);

            const yearHtml = item.year ? item.year : 'N/A';
            const imageSrc = item.image || 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4=';
            const cleanTitle = item.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

            const onClickHtml = (item.tmdbId && item.mediaType) ? `onclick="window.location.href='details.html?id=${item.tmdbId}&type=${item.mediaType}'" style="cursor: pointer;"` : '';

            card.innerHTML = `
            <div class="poster-wrapper" ${onClickHtml}>
                <img src="${imageSrc}" class="poster-image" alt="${cleanTitle}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4='">
                <div class="platform-tag">${item.platform}</div>
                <div class="poster-overlay">
                    <div style="width: 100%; display: flex; flex-direction: column; gap: 8px;">
                        <select class="overlay-select" onchange="event.stopPropagation(); window.updateItem(${item.id}, 'platform', this.value)" onclick="event.stopPropagation()">
                            <option value="Netflix" ${item.platform === 'Netflix' ? 'selected' : ''}>Netflix</option>
                            <option value="Prime Video" ${item.platform === 'Prime Video' ? 'selected' : ''}>Prime Video</option>
                            <option value="Disney+" ${item.platform === 'Disney+' ? 'selected' : ''}>Disney+</option>
                            <option value="Crunchyroll" ${item.platform === 'Crunchyroll' ? 'selected' : ''}>Crunchyroll</option>
                            <option value="Rakuten Viki" ${item.platform === 'Rakuten Viki' ? 'selected' : ''}>Rakuten Viki</option>
                            <option value="Other" ${item.platform === 'Other' ? 'selected' : ''}>Other</option>
                        </select>
                        <select class="overlay-select" onchange="event.stopPropagation(); window.updateItem(${item.id}, 'status', this.value)" onclick="event.stopPropagation()">
                            <option value="Watching" ${item.status === 'Watching' ? 'selected' : ''}>Watching</option>
                            <option value="plan-to-watch" ${item.status === 'plan-to-watch' ? 'selected' : ''}>Plan to watch</option>
                            <option value="on-hold" ${item.status === 'on-hold' ? 'selected' : ''}>On Hold</option>
                            <option value="watched" ${item.status === 'watched' ? 'selected' : ''}>Watched</option>
                        </select>
                        <button class="delete-btn-wide" onclick="event.stopPropagation(); window.deleteItem(${item.id})" title="Remove from Watchlist">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            Remove
                        </button>
                    </div>
                </div>
            </div>
            <div class="poster-info">
                <div class="poster-title" ${onClickHtml}>${item.title}</div>
                <div class="poster-year">${yearHtml}</div>
            </div>
            `;
            listContainer.appendChild(card);
        }

        function renderFavoriteItem(item) {
            const listContainer = document.getElementById('list-favorites');
            if (!listContainer) return;

            const emptyState = listContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const card = document.createElement('div');
            card.className = 'poster-card';
            card.setAttribute('data-favid', item.id);

            const yearHtml = item.year ? item.year : 'N/A';
            const imageSrc = item.image || 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4=';
            const cleanTitle = item.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

            const onClickHtml = (item.tmdbId && item.mediaType) ? `onclick="window.location.href='details.html?id=${item.tmdbId}&type=${item.mediaType}'" style="cursor: pointer;"` : '';

            card.innerHTML = `
            <div class="poster-wrapper" ${onClickHtml}>
                <img src="${imageSrc}" class="poster-image" alt="${cleanTitle}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4='">
                <div class="poster-overlay">
                    <div style="width: 100%; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; gap: 8px;">
                        <button class="delete-btn-wide" onclick="event.stopPropagation(); window.deleteFavoriteItem(${item.id})" title="Remove from Favorites" style="background: rgba(255, 51, 102, 0.1); color: #ff3366; border-color: rgba(255, 51, 102, 0.4);">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            Unfavorite
                        </button>
                    </div>
                </div>
            </div>
            <div class="poster-info">
                <div class="poster-title" ${onClickHtml}>${item.title}</div>
                <div class="poster-year">${yearHtml}</div>
            </div>
            `;
            listContainer.appendChild(card);
        }

        function loadData() {
            let filteredWatchlist = windowUserWatchlist;
            if (currentPlatformFilter !== 'All') {
                filteredWatchlist = windowUserWatchlist.filter(item => item.platform === currentPlatformFilter);
            }
            filteredWatchlist.forEach(item => renderItem(item));

            windowUserFavorites.forEach(item => renderFavoriteItem(item));

            updateCounts();
        }

        function updateCounts() {
            const counts = [];
            ['Watching', 'plan-to-watch', 'on-hold', 'watched'].forEach(status => {
                const listId = `list-${status}`;
                const countId = `count-${status}`;
                const container = document.getElementById(listId);
                const counter = document.getElementById(countId);

                if (container && counter) {
                    const itemCount = container.querySelectorAll('.poster-card').length;
                    counter.innerText = itemCount;
                    counts.push(itemCount);
                } else {
                    counts.push(0);
                }
            });

            // Favorites count
            const favContainer = document.getElementById('list-favorites');
            const favCounter = document.getElementById('count-favorites');
            if (favContainer && favCounter) {
                favCounter.innerText = favContainer.querySelectorAll('.poster-card').length;
            }

            updateChart(counts);
        }

        window.deleteItem = async function (id) {
            const card = document.querySelector(`[data-id="${id}"]`);
            if (card) {
                card.style.animation = "fadeOut 0.3s ease forwards";

                windowUserWatchlist = windowUserWatchlist.filter(x => x.id !== id);

                try {
                    await setDoc(doc(db, "users", currentUser.uid), { watchlist: windowUserWatchlist }, { merge: true });
                } catch (e) {
                    console.error("Delete Error", e);
                }

                setTimeout(() => {
                    const parentGrid = card.parentElement;
                    card.remove();

                    if (parentGrid.querySelectorAll('.poster-card').length === 0) {
                        parentGrid.innerHTML = '<div class="empty-state">No items yet</div>';
                    }
                    updateCounts();
                }, 300);
            }
        }

        window.updateItem = async function (id, field, value) {
            let itemIndex = windowUserWatchlist.findIndex(x => x.id === id);
            if (itemIndex > -1) {
                windowUserWatchlist[itemIndex][field] = value;

                try {
                    await setDoc(doc(db, "users", currentUser.uid), { watchlist: windowUserWatchlist }, { merge: true });
                    refreshDashboard();
                } catch (e) {
                    console.error("Update Error", e);
                }
            }
        }

        window.deleteFavoriteItem = async function (id) {
            const card = document.querySelector(`[data-favid="${id}"]`);
            if (card) {
                card.style.animation = "fadeOut 0.3s ease forwards";

                windowUserFavorites = windowUserFavorites.filter(x => x.id !== id);

                try {
                    await setDoc(doc(db, "users", currentUser.uid), { favorites: windowUserFavorites }, { merge: true });
                } catch (e) {
                    console.error("Delete Error", e);
                }

                setTimeout(() => {
                    const parentGrid = card.parentElement;
                    card.remove();

                    if (parentGrid.querySelectorAll('.poster-card').length === 0) {
                        parentGrid.innerHTML = '<div class="empty-state">No favorites yet</div>';
                    }
                    updateCounts();
                }, 300);
            }
        }

        function refreshDashboard() {
            ['list-favorites', 'list-Watching', 'list-plan-to-watch', 'list-on-hold', 'list-watched'].forEach(listId => {
                const container = document.getElementById(listId);
                if (container) {
                    container.innerHTML = `<div class="empty-state">No ${listId === 'list-favorites' ? 'favorites' : 'items'} yet</div>`;
                }
            });
            loadData();
        }
    </script>

</body>
