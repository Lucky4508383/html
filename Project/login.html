<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Universal Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ed1c24; /* Trakt Red */
            --primary-hover: #ff333a;
            --primary-glow: rgba(237, 28, 36, 0.4);
            --bg-body: #09090b;
            --bg-glass: rgba(20, 20, 25, 0.65);
            --bg-glass-hover: rgba(30, 30, 35, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            /* Animated background mesh gradient */
            background-image: 
                radial-gradient(at 0% 0%, rgba(237, 28, 36, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 58, 138, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(237, 28, 36, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(15, 23, 42, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: rgba(15, 15, 20, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .brand {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffccd0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .brand::before {
            content: '';
            display: inline-block;
            width: 32px;
            height: 32px;
            background-color: var(--primary);
            border-radius: 8px;
            mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 22h20L12 2z"/></svg>') center/contain no-repeat;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 3L1 21h22L12 3z"/></svg>') center/contain no-repeat;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .auth-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 3px rgba(237, 28, 36, 0.2);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(237, 28, 36, 0.3);
        }

        .auth-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(237, 28, 36, 0.4);
        }

        .auth-btn:active {
            transform: translateY(1px);
        }

        .auth-btn:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-mode {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .toggle-mode span {
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
            margin-left: 5px;
        }

        .toggle-mode span:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .error-message {
            background: rgba(255, 77, 79, 0.1);
            color: #ff4d4f;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 77, 79, 0.3);
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: white;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>

    <div class="auth-container">
        <div class="brand">Watchlist</div>
        <h2 class="auth-title" id="formTitle">Sign In</h2>
        <p class="auth-subtitle" id="formSubtitle">Welcome back! Please enter your details.</p>

        <div class="error-message" id="errorBox">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span id="errorText">Invalid credentials.</span>
        </div>

        <form id="authForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="auth-input" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label id="passwordLabel" for="password">Password</label>
                <input type="password" id="password" class="auth-input" placeholder="••••••••" required minlength="6">
            </div>
            
            <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>
        </form>

        <div class="toggle-mode" id="toggleMode">
            Don't have an account? <span>Sign Up</span>
        </div>
    </div>

    <!-- Integrate Firebase Module -->
    <script type="module">
        import { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from './firebase-config.js';

        let isLoginMode = true;
        
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleMode = document.getElementById('toggleMode');
        const authForm = document.getElementById('authForm');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const passwordLabel = document.getElementById('passwordLabel');

        // Toggle between Login and Sign Up
        toggleMode.querySelector('span').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                formTitle.textContent = "Sign In";
                formSubtitle.textContent = "Welcome back! Please enter your details.";
                submitBtn.textContent = "Sign In";
                passwordLabel.textContent = "Password";
                toggleMode.innerHTML = `Don't have an account? <span>Sign Up</span>`;
            } else {
                formTitle.textContent = "Create Account";
                formSubtitle.textContent = "Sign up to start saving your watchlist securely.";
                submitBtn.textContent = "Sign Up";
                passwordLabel.textContent = "Create a custom password";
                toggleMode.innerHTML = `Already have an account? <span>Sign In</span>`;
            }
            errorBox.classList.remove('show');
            
            // Re-attach listener dynamically
            toggleMode.querySelector('span').addEventListener('click', arguments.callee);
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) return;

            submitBtn.disabled = true;
            submitBtn.textContent = "Please wait...";
            errorBox.classList.remove('show');

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                // Redirect on success
                window.location.href = "watchlist.html";
            } catch (error) {
                console.error(error);
                let message = "An error occurred. Please try again.";
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    message = "Invalid email or password.";
                } else if (error.code === 'auth/email-already-in-use') {
                    message = "An account already exists with this email.";
                } else if (error.code === 'auth/weak-password') {
                    message = "Password should be at least 6 characters.";
                }
                
                errorText.textContent = message;
                errorBox.classList.add('show');
                
                submitBtn.disabled = false;
                submitBtn.textContent = isLoginMode ? "Sign In" : "Sign Up";
            }
        });
    </script>
</body>
</html>
