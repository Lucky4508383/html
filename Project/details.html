<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details - Universal Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ed1c24;
            --primary-hover: #ff333a;
            --primary-glow: rgba(237, 28, 36, 0.4);
            --bg-body: #09090b;
            --bg-glass: rgba(20, 20, 25, 0.65);
            --bg-glass-hover: rgba(30, 30, 35, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0 40px;
            display: flex;
            align-items: center;
            height: 70px;
            gap: 40px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffccd0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            background-color: var(--primary);
            border-radius: 6px;
            mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 22h20L12 2z"/></svg>') center/contain no-repeat;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 3L1 21h22L12 3z"/></svg>') center/contain no-repeat;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .nav-links {
            display: flex;
            gap: 25px;
            height: 100%;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            position: relative;
            transition: color 0.3s ease;
            letter-spacing: 0.3px;
        }

        .nav-link:hover {
            color: white;
        }

        .hero-section {
            position: relative;
            width: 100%;
            min-height: 80vh;
            display: flex;
            align-items: center;
            padding: 100px 40px 40px 40px;
            overflow: hidden;
        }

        .hero-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center 20%;
            z-index: 0;
            filter: brightness(0.6);
        }

        .hero-backdrop::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(9, 9, 11, 0.95) 10%, rgba(9, 9, 11, 0.6) 50%, rgba(9, 9, 11, 0.4) 100%),
                        linear-gradient(to top, rgba(9, 9, 11, 1) 0%, rgba(9, 9, 11, 0) 25%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 50px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .poster-container {
            flex-shrink: 0;
            width: 300px;
            height: 450px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .poster-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .media-title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .media-tagline {
            font-size: 1.25rem;
            color: var(--text-muted);
            font-style: italic;
            font-weight: 400;
        }

        .meta-tags {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .meta-tag {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .rating-tag {
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.3);
            background: rgba(245, 158, 11, 0.1);
        }

        .media-overview {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #d1d5db;
            max-width: 800px;
        }

        /* Action Buttons Area */
        .action-area {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .action-select {
            background: rgba(20, 20, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px top 50%;
            background-size: 12px auto;
            padding-right: 40px;
            font-family: inherit;
        }

        .action-select option {
            background: #111;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(237, 28, 36, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(237, 28, 36, 0.5);
        }

        .content-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background-color: var(--primary);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--primary-glow);
        }

        /* Horizontal Scroll Containers */
        .h-scroll {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }

        .h-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .h-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        /* Cast Card */
        .cast-card {
            flex: 0 0 150px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            overflow: hidden;
            padding-bottom: 12px;
        }
        
        .cast-img {
            width: 100%;
            height: 225px;
            object-fit: cover;
            background: #111;
        }

        .cast-info {
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cast-name {
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cast-role {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Video Card */
        .video-card {
            flex: 0 0 320px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
            background: #111;
            aspect-ratio: 16/9;
            position: relative;
        }

        .video-card iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Similar Cards using same styles as index */
        .poster-card {
            flex: 0 0 180px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: pointer;
        }

        .poster-wrapper {
            width: 100%;
            aspect-ratio: 2 / 3;
            border-radius: 12px;
            overflow: hidden;
            background-color: rgba(20, 20, 25, 0.5);
            border: 1px solid var(--border-glass);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .poster-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .poster-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .poster-title {
            font-size: 1.05rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .poster-year {
            font-size: 0.85rem;
            color: var(--text-muted);
        }



        .loader-full {
            position: fixed;
            inset: 0;
            background: var(--bg-body);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .hero-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding-top: 40px;
            }
            .meta-tags {
                justify-content: center;
            }
            .action-area {
                justify-content: center;
            }
            .media-title { font-size: 2.5rem; }
            .hero-backdrop::after {
                background: linear-gradient(to top, rgba(9, 9, 11, 1) 0%, rgba(9, 9, 11, 0.8) 50%, rgba(9, 9, 11, 0.4) 100%);
            }
        }
        
    </style>
</head>

<body>

    <div class="loader-full" id="pageLoader">
        <div class="spinner"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="brand">Watchlist</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Search</a>
            <a href="watchlist.html" class="nav-link">Dashboard</a>
            <a href="login.html" class="nav-link" id="authLink">Sign In</a>
        </div>
    </nav>

    <div id="appContent" style="display: none;">
        <section class="hero-section">
            <div class="hero-backdrop" id="heroBackdrop"></div>
            <div class="hero-content">
                <div class="poster-container">
                    <img id="mainPoster" src="" alt="Poster">
                </div>
                <div class="info-container">
                    <div class="title-group">
                        <h1 class="media-title" id="mainTitle"></h1>
                        <div class="media-tagline" id="mainTagline"></div>
                    </div>
                    <div class="meta-tags" id="metaTags">
                        <!-- Injected via JS -->
                    </div>
                    <div class="media-overview" id="mainOverview"></div>
                    
                    <div class="action-area" id="actionArea">
                        <select id="platformSelect" class="action-select">
                            <option value="Netflix">Netflix</option>
                            <option value="Prime Video">Prime Video</option>
                            <option value="Disney+">Disney+</option>
                            <option value="Crunchyroll">Crunchyroll</option>
                            <option value="Rakuten Viki">Rakuten Viki</option>
                            <option value="Other" selected>Other</option>
                        </select>
                        <select id="statusSelect" class="action-select">
                            <option value="Watching">Watching</option>
                            <option value="plan-to-watch">Plan to watch</option>
                            <option value="on-hold">On Hold</option>
                            <option value="watched">Watched</option>
                        </select>
                        <button class="action-btn" id="addBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Add to List
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="content-section" id="castSection" style="display:none;">
            <h2 class="section-title">Cast</h2>
            <div class="h-scroll" id="castContainer"></div>
        </section>

        <section class="content-section" id="videoSection" style="display:none;">
            <h2 class="section-title">Videos</h2>
            <div class="h-scroll" id="videoContainer"></div>
        </section>

        <section class="content-section" id="seasonSection" style="display:none;">
            <h2 class="section-title">Seasons</h2>
            <div class="h-scroll" id="seasonContainer"></div>
        </section>

        <section class="content-section" id="similarSection" style="display:none;">
            <h2 class="section-title">You Might Also Like</h2>
            <div class="h-scroll" id="similarContainer"></div>
        </section>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, signOut, doc, setDoc, getDoc } from './firebase-config.js';

        let currentUser = null;
        let windowUserWatchlist = [];
        let currentMediaObj = null; // Store fetched data

        const pageLoader = document.getElementById('pageLoader');
        const appContent = document.getElementById('appContent');
        const authLink = document.getElementById('authLink');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                authLink.textContent = "Logout";
                authLink.href = "#";
                authLink.onclick = (e) => {
                    e.preventDefault();
                    signOut(auth).then(() => { window.location.reload(); });
                };

                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().watchlist) {
                        windowUserWatchlist = userDoc.data().watchlist;
                    }
                } catch (e) {
                    console.error("Error fetching watchlist", e);
                }
            } else {
                currentUser = null;
                windowUserWatchlist = [];
                authLink.textContent = "Sign In";
                authLink.href = "login.html";
                authLink.onclick = null;
            }
            updateWatchlistUI();
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const tmdbId = urlParams.get('id');
            const mediaType = urlParams.get('type') || 'movie';

            if (!tmdbId) {
                // If no ID, back to search
                window.location.href = "index.html";
                return;
            }

            try {
                const response = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}?append_to_response=credits,reviews,videos,similar&api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb`);
                if (!response.ok) throw new Error("Failed to fetch");
                const data = await response.json();

                currentMediaObj = data;
                currentMediaObj._type = mediaType;
                currentMediaObj._myId = tmdbId;

                renderHero(data, mediaType);
                renderCast(data.credits?.cast);
                renderVideos(data.videos?.results);
                if (mediaType === 'tv') renderSeasons(data.seasons);
                renderSimilar(data.similar?.results, mediaType);

                pageLoader.style.display = 'none';
                appContent.style.display = 'block';
                updateWatchlistUI(); // Initial check if logged in
            } catch (err) {
                console.error(err);
                document.body.innerHTML = '<h2 style="text-align:center; margin-top: 100px;">Media not found.</h2>';
            }
        });

        function renderHero(data, type) {
            const backdropUrl = data.backdrop_path ? `https://image.tmdb.org/t/p/original${data.backdrop_path}` : '';
            if (backdropUrl) {
                document.getElementById('heroBackdrop').style.backgroundImage = `url('${backdropUrl}')`;
            }

            const defaultImg = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4=';
            document.getElementById('mainPoster').src = data.poster_path ? `https://image.tmdb.org/t/p/w500${data.poster_path}` : defaultImg;

            const title = type === 'movie' ? (data.title || data.original_title) : (data.name || data.original_name);
            document.getElementById('mainTitle').innerText = title;

            if (data.tagline) {
                document.getElementById('mainTagline').innerText = `"${data.tagline}"`;
            } else {
                document.getElementById('mainTagline').style.display = 'none';
            }

            document.getElementById('mainOverview').innerText = data.overview || 'No synopsis available.';

            const dateStr = type === 'movie' ? data.release_date : data.first_air_date;
            const yearStr = dateStr ? dateStr.substring(0, 4) : 'N/A';
            
            const rating = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';
            const runtime = type === 'movie' ? data.runtime + ' min' : (data.episode_run_time?.[0] ? data.episode_run_time[0] + ' min' : (data.number_of_seasons ? data.number_of_seasons + ' Seasons' : ''));

            let tagsHtml = `<div class="meta-tag rating-tag">★ ${rating}</div>`;
            tagsHtml += `<div class="meta-tag">${yearStr}</div>`;
            if (runtime) tagsHtml += `<div class="meta-tag">${runtime}</div>`;
            
            if (data.genres) {
                data.genres.slice(0, 3).forEach(g => {
                    tagsHtml += `<div class="meta-tag">${g.name}</div>`;
                });
            }

            document.getElementById('metaTags').innerHTML = tagsHtml;
            document.title = `${title} - Universal Watchlist`;

            // Auto-detect platform for UI default
            let autoPlatform = "Other";
            if (data.networks && data.networks.length > 0) {
                let netLower = data.networks[0].name.toLowerCase();
                if (netLower.includes("netflix")) autoPlatform = "Netflix";
                else if (netLower.includes("amazon") || netLower.includes("prime")) autoPlatform = "Prime Video";
                else if (netLower.includes("disney")) autoPlatform = "Disney+";
                else if (netLower.includes("crunchyroll")) autoPlatform = "Crunchyroll";
                else if (netLower.includes("viki")) autoPlatform = "Rakuten Viki";
            } else if (data.production_companies && data.production_companies.length > 0) {
                 let netLower = data.production_companies[0].name.toLowerCase();
                 if (netLower.includes("netflix")) autoPlatform = "Netflix";
            }
            document.getElementById('platformSelect').value = autoPlatform;
        }

        function renderCast(castArray) {
            if (!castArray || castArray.length === 0) return;
            document.getElementById('castSection').style.display = 'block';
            
            const container = document.getElementById('castContainer');
            const defaultMug = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4=';
            
            const html = castArray.slice(0, 15).map(person => {
                const img = person.profile_path ? `https://image.tmdb.org/t/p/w200${person.profile_path}` : defaultMug;
                return `
                <div class="cast-card">
                    <img src="${img}" class="cast-img" alt="${person.name}" onerror="this.src='${defaultMug}'">
                    <div class="cast-info">
                        <div class="cast-name">${person.name}</div>
                        <div class="cast-role">${person.character}</div>
                    </div>
                </div>
                `;
            }).join('');
            container.innerHTML = html;
        }

        function renderVideos(videoArray) {
            if (!videoArray) return;
            const validTrailers = videoArray.filter(v => v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser')).slice(0, 3);
            if (validTrailers.length === 0) return;

            document.getElementById('videoSection').style.display = 'block';
            const container = document.getElementById('videoContainer');
            
            const html = validTrailers.map(vid => `
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/${vid.key}" allowfullscreen></iframe>
                </div>
            `).join('');
            container.innerHTML = html;
        }

        function renderSeasons(seasonArray) {
            if (!seasonArray || seasonArray.length === 0) return;
            document.getElementById('seasonSection').style.display = 'block';
            
            const container = document.getElementById('seasonContainer');
            const defaultImg = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4=';
            
            // Optionally filter out specials (season 0) or just sort them
            const sortedSeasons = seasonArray.filter(s => s.season_number > 0).sort((a,b) => a.season_number - b.season_number);
            if (sortedSeasons.length === 0) return; // if only specials were there
            
            const html = sortedSeasons.map(season => {
                const img = season.poster_path ? `https://image.tmdb.org/t/p/w200${season.poster_path}` : defaultImg;
                const year = season.air_date ? season.air_date.substring(0, 4) : 'N/A';
                const epCount = season.episode_count ? `${season.episode_count} Episodes` : '';
                return `
                <div class="poster-card" style="cursor: default;">
                    <div class="poster-wrapper" style="pointer-events: none;">
                        <img src="${img}" alt="${season.name}" onerror="this.src='${defaultImg}'">
                    </div>
                    <div class="poster-title">${season.name}</div>
                    <div class="poster-year">${year} ${epCount ? '• ' + epCount : ''}</div>
                </div>
                `;
            }).join('');
            container.innerHTML = html;
        }

        function renderSimilar(similarArray, type) {
            if (!similarArray || similarArray.length === 0) return;
            document.getElementById('similarSection').style.display = 'block';
            
            const container = document.getElementById('similarContainer');
            const defaultImg = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4=';
            
            const html = similarArray.slice(0, 10).map(item => {
                const img = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : defaultImg;
                const title = type === 'movie' ? (item.title || item.original_title) : (item.name || item.original_name);
                const year = type === 'movie' ? (item.release_date?.substring(0,4)) : (item.first_air_date?.substring(0,4));
                return `
                <div class="poster-card" onclick="window.location.href='details.html?id=${item.id}&type=${type}'">
                    <div class="poster-wrapper">
                        <img src="${img}" alt="${title}" onerror="this.src='${defaultImg}'">
                    </div>
                    <div class="poster-title">${title}</div>
                    <div class="poster-year">${year || 'N/A'}</div>
                </div>
                `;
            }).join('');
            container.innerHTML = html;
        }

        function updateWatchlistUI() {
            if (!currentMediaObj) return;

            const title = currentMediaObj._type === 'movie' ? (currentMediaObj.title || currentMediaObj.original_title) : (currentMediaObj.name || currentMediaObj.original_name);
            const dateStr = currentMediaObj._type === 'movie' ? currentMediaObj.release_date : currentMediaObj.first_air_date;
            const itemYear = dateStr ? dateStr.substring(0, 4) : null;
            
            // Note: We check by title and year, or tmdbId if we added it newly
            const watchlistItem = windowUserWatchlist.find(w => w.tmdbId == currentMediaObj._myId || (w.title === title && w.year == itemYear));

            const btn = document.getElementById('addBtn');
            const platSelect = document.getElementById('platformSelect');
            const statSelect = document.getElementById('statusSelect');

            if (watchlistItem) {
                platSelect.style.display = 'none';
                statSelect.style.display = 'none';
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg> In your list (${watchlistItem.status.replace(/-/g, ' ')})`;
                btn.style.background = "rgba(20, 20, 25, 0.8)";
                btn.style.border = "1px solid rgba(255, 255, 255, 0.2)";
                btn.style.color = "var(--primary)";
                btn.onclick = () => alert("Already in your watchlist!");
            } else {
                platSelect.style.display = 'block';
                statSelect.style.display = 'block';
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Add to List`;
                btn.style.background = "var(--primary)";
                btn.style.border = "none";
                btn.style.color = "white";
                btn.onclick = async () => {
                    if (!currentUser) {
                        window.location.href = "login.html";
                        return;
                    }

                    const platform = platSelect.value;
                    const status = statSelect.value;
                    const defaultImg = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMWIxZDIyIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHdpZHRoPSIzMCIgaGVpZ2h0PSI0MCIgcng9IjQiLz48cGF0aCBkPSJNMTAgMjBsMTAgMTAiLz48cGF0aCBkPSJNMjAgMjBMMTAgMzAiLz48L3N2Zz4=';
                    const image = currentMediaObj.poster_path ? `https://image.tmdb.org/t/p/w500${currentMediaObj.poster_path}` : defaultImg;
                    
                    const mediaObj = {
                        id: Date.now(),
                        tmdbId: currentMediaObj._myId,
                        mediaType: currentMediaObj._type,
                        title,
                        platform,
                        status,
                        image,
                        year: itemYear
                    };

                    windowUserWatchlist.push(mediaObj);
                    
                    try {
                        await setDoc(doc(db, "users", currentUser.uid), { watchlist: windowUserWatchlist }, { merge: true });
                        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg> Added`;
                        setTimeout(() => updateWatchlistUI(), 1500);
                    } catch (e) {
                        console.error("Error saving to Firestore", e);
                    }
                };
            }
        }
    </script>
</body>
</html>
